<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Agent Rules Generator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="AI Agent Rules Generator">
        <form class="panel input-panel" id="projectForm">
          <div class="brand-row">
            <div>
              <p class="eyebrow">Source of Truth</p>
              <h1>AI Agent Rules Generator</h1>
            </div>
            <button class="ghost-button" type="button" id="resetButton">Reset</button>
          </div>

          <label>
            Project name
            <input id="projectName" name="projectName" value="MaintainerBuddy" maxlength="60" required />
          </label>

          <label>
            Project purpose
            <input
              id="purpose"
              name="purpose"
              value="A small tool that keeps AI coding agents aligned with the repository context."
              maxlength="150"
              required
            />
          </label>

          <div class="field-grid">
            <label>
              Stack
              <select id="stack" name="stack">
                <option>Static HTML/CSS/JavaScript</option>
                <option>React + TypeScript</option>
                <option>Next.js + TypeScript</option>
                <option>Python CLI</option>
                <option>Node.js CLI</option>
              </select>
            </label>

            <label>
              Stage
              <select id="stage" name="stage">
                <option>Prototype</option>
                <option>MVP</option>
                <option>Beta</option>
                <option>Production</option>
              </select>
            </label>
          </div>

          <label>
            Source of truth
            <textarea id="sourceTruth" name="sourceTruth" rows="7" required>Architecture lives in plain HTML, CSS, and JavaScript.
The app must stay static and easy to fork.
Generated agent files should not be hand-maintained.
Humans edit this source context, then regenerate downstream files.
Keep instructions short enough for agents to actually follow.</textarea>
          </label>

          <label>
            Agent rules
            <textarea id="rules" name="rules" rows="6" required>Inspect nearby files before editing
Keep changes small and focused
Do not rewrite unrelated user work
Update docs when behavior changes
Check desktop and mobile layout after UI changes</textarea>
          </label>

          <label>
            Verification command
            <input id="verifyCommand" name="verifyCommand" value="open index.html and test the generator manually" maxlength="140" />
          </label>

          <fieldset>
            <legend>Generated files</legend>
            <label class="check-row">
              <input type="checkbox" name="docType" value="source" checked />
              AGENT_CONTEXT.md
            </label>
            <label class="check-row">
              <input type="checkbox" name="docType" value="agents" checked />
              AGENTS.md
            </label>
            <label class="check-row">
              <input type="checkbox" name="docType" value="cursor" checked />
              Cursor rule
            </label>
            <label class="check-row">
              <input type="checkbox" name="docType" value="copilot" checked />
              Copilot instructions
            </label>
            <label class="check-row">
              <input type="checkbox" name="docType" value="claude" checked />
              CLAUDE.md
            </label>
            <label class="check-row">
              <input type="checkbox" name="docType" value="launch" checked />
              Launch post
            </label>
          </fieldset>
        </form>

        <section class="panel output-panel">
          <div class="toolbar">
            <div class="tabs" role="tablist" aria-label="Generated files">
              <button class="tab is-active" type="button" data-doc="source">Source</button>
              <button class="tab" type="button" data-doc="agents">AGENTS.md</button>
              <button class="tab" type="button" data-doc="cursor">Cursor</button>
              <button class="tab" type="button" data-doc="copilot">Copilot</button>
              <button class="tab" type="button" data-doc="claude">CLAUDE.md</button>
              <button class="tab" type="button" data-doc="launch">Launch</button>
            </div>
            <button class="primary-button" type="button" id="copyButton">Copy</button>
          </div>

          <div class="file-strip" id="filePath">AGENT_CONTEXT.md</div>
          <pre class="output" id="outputText" tabindex="0"></pre>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
